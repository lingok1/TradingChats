services:
  backend:
    build:
      context: ./trading-chats-backend
      dockerfile: Dockerfile.runtime
    container_name: trading-chats-backend
    restart: unless-stopped
    environment:
      PORT: 8080
      ENV: production
      MONGODB_URI: mongodb://admin:mongo123@150.158.18.92:27017
      MONGODB_DATABASE: trading_chats
      REDIS_URI: redis://:redis123@150.158.18.92:6379/0
      JWT_SECRET: your_jwt_secret_key
      JWT_EXPIRATION: 24h
      API_TIMEOUT: 30s
    ports:
      - "8080:8080"

  frontend:
    build:
      context: ./trading-chats-frontend
      dockerfile: Dockerfile.runtime
    container_name: trading-chats-frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "80:80"
