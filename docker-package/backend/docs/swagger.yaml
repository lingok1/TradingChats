basePath: /api
definitions:
  models.GenerateAIRequest:
    properties:
      param1:
        example: https://api.example.com/data1
        type: string
      param2:
        example: https://api.example.com/data2
        type: string
      template_id:
        example: 69b4e08fbd4f24a37ff0a0cc
        type: string
    type: object
  models.ModelAPIConfig:
    properties:
      api_key:
        type: string
      api_url:
        type: string
      created_at: {}
      id:
        type: string
      models:
        description: 一次可添加多个模型名称
        items:
          type: string
        type: array
      name:
        type: string
      provider:
        description: anthropic, openai
        type: string
      updated_at: {}
    type: object
  models.PromptTemplate:
    properties:
      content:
        type: string
      created_at: {}
      id:
        type: string
      name:
        type: string
      tags:
        description: 股票、期货、期权等
        items:
          type: string
        type: array
      updated_at: {}
    type: object
  models.Response:
    properties:
      code:
        type: integer
      data: {}
      msg:
        type: string
    type: object
  models.SaveSystemBasicConfigRequest:
    properties:
      system_logo:
        type: string
      system_title:
        type: string
    type: object
  models.SaveSystemParametersRequest:
    properties:
      parameters:
        additionalProperties:
          type: string
        type: object
    type: object
  models.ScheduleConfig:
    properties:
      created_at: {}
      cron_expr:
        description: cron表达式，如 "*/10 * * * *"
        type: string
      id:
        type: string
      name:
        type: string
      param1:
        description: 参数1
        type: string
      param2:
        description: 参数2
        type: string
      status:
        description: 'active: 启用, paused: 暂停'
        type: string
      template_id:
        description: 关联的提示词模版ID
        type: string
      updated_at: {}
    type: object
  models.SystemConfig:
    properties:
      id:
        type: string
      parameters:
        additionalProperties:
          type: string
        type: object
      system_logo:
        type: string
      system_title:
        type: string
      updated_at:
        type: string
    type: object
